<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>作曲ツール</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>

<!-- ======= トップバー ======= -->
<header class="topbar">
    <button class="btn-menu" id="menuBtn">☰</button>
    <span class="topbar-title" id="topbarTitle">作曲ツール</span>
    <div class="topbar-right">
        <div class="bpm-wrap">
            BPM<input type="number" class="bpm-input" id="bpmInput" value="120" min="30" max="300">
        </div>
        <button class="btn btn-play" id="playBtn">▶</button>
        <button class="btn btn-stop" id="stopBtn">■</button>
    </div>
</header>

<!-- ======= サイドバーオーバーレイ ======= -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ======= サイドバー ======= -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-heading">トラック</div>
    <ul class="track-list" id="trackList" style="list-style:none;margin:0;padding:0;"></ul>
    <div class="sidebar-footer">
        <button class="btn-add-track" id="addTrackBtn">＋ トラック追加</button>
        <div class="sidebar-actions">
            <button class="btn-sidebar-action" id="exportBtn">↓ 保存</button>
            <button class="btn-sidebar-action" id="importBtn">↑ 読込</button>
            <button class="btn-sidebar-action" id="resetBtn">✕ 新規</button>
        </div>
        <input type="file" id="importFile" accept=".json" style="display:none">
    </div>
</aside>

<!-- ======= メインエリア ======= -->
<main class="main" id="main">
    <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">🎹</div>
        <div class="empty-state-text">
            ☰ メニューを開いて<br>トラックを選択してください
        </div>
    </div>
    <div id="trackEditor" style="display:none;"></div>
</main>


<!-- ======= 楽器選択モーダル ======= -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-handle"></div>
        <h2>楽器を選択</h2>
        <div class="modal-options" id="modalOptions"></div>
        <button class="btn-cancel" id="modalCancel">キャンセル</button>
    </div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
