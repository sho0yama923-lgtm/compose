<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ezmelo</title>
    <link rel="stylesheet" href="./src/styles/editor.css">
</head>
<body>

<!-- ======= 起動オーバーレイ ======= -->
<div class="boot-overlay" id="bootOverlay">
    <div class="boot-overlay-content">
        <div class="boot-overlay-icon">🎹</div>
        <div class="boot-overlay-text">準備しています...</div>
    </div>
</div>

<!-- ======= トップバー ======= -->
<header class="topbar">
    <button class="btn-menu" id="menuBtn">☰</button>
    <div class="topbar-tabs" id="topbarTabs" aria-label="表示するトラック">
        <button class="btn topbar-tab-btn is-active" id="viewToggleBtn" type="button" data-topbar-view="preview" aria-pressed="true">全体</button>
    </div>
    <div class="topbar-right">
        <div class="bpm-wrap">
            <input type="number" class="bpm-input" id="bpmInput" value="120" min="30" max="300" aria-label="BPM">
        </div>
    </div>
</header>

<!-- ======= サイドバーオーバーレイ ======= -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ======= サイドバー ======= -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-heading">トラック</div>
    <ul class="track-list" id="trackList" style="list-style:none;margin:0;padding:0;"></ul>
    <div class="sidebar-footer">
        <button class="btn-add-track" id="addTrackBtn">＋ トラック追加</button>
        <div class="sidebar-actions">
            <button class="btn-sidebar-action" id="resetBtn">一覧</button>
            <button class="btn-sidebar-action" id="exportBtn">エクスポート</button>
            <button class="btn-sidebar-action" id="importBtn">インポート</button>
        </div>
        <input type="file" id="importFile" accept=".json" style="display:none">
    </div>
</aside>

<!-- ======= メインエリア ======= -->
<main class="main" id="main">
    <section class="project-home" id="projectHome" hidden></section>
    <div class="empty-state" id="emptyState">
        <div class="empty-state-icon loading" id="emptyStateIcon">🎹</div>
        <div class="empty-state-text" id="emptyStateText">
            読み込み中...
        </div>
    </div>
    <div id="trackEditor" style="display:none;"></div>
</main>


<!-- ======= 楽器選択モーダル ======= -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-handle"></div>
        <h2>楽器を選択</h2>
        <div class="modal-options" id="modalOptions"></div>
        <button class="btn-cancel" id="modalCancel">キャンセル</button>
    </div>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
